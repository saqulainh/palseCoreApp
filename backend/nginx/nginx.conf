upstream pulsecore_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name api.pulsecore.com; # Replace with actual domain

    client_max_body_size 20M;

    location / {
        proxy_pass http://pulsecore_backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;

        # WebSocket support (for streaming if needed via channels, currently streaming via DRF doesn't need this, but good to have)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /static/ {
        alias /code/static/;
    }

    location /media/ {
        alias /code/media/;
    }
}
