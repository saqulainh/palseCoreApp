version: '3.8'

services:
  db:
    image: timescale/timescaledb-ha:pg15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/home/postgres/pgdata/data
    networks:
      - pulse_network

  redis:
    image: redis:alpine
    restart: always
    networks:
      - pulse_network

  backend:
    build: .
    command: gunicorn pulsecore.wsgi:application --bind 0.0.0.0:8000 --workers 3
    restart: always
    volumes:
      - static_volume:/code/static
      - media_volume:/code/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - pulse_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/code/static
      - media_volume:/code/media
    depends_on:
      - backend
    networks:
      - pulse_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  pulse_network:
